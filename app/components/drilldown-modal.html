<!-- Drill-Down Modal Component -->
<!-- Used to show voucher details when clicking on report line items -->

<style>
.drilldown-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 10000;
  overflow-y: auto;
}

.drilldown-modal.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

.drilldown-modal .modal-content {
  background: white;
  border-radius: 8px;
  width: 90%;
  max-width: 900px;
  max-height: 85vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
}

.drilldown-modal .modal-header {
  background: #4f46e5;
  color: white;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.drilldown-modal .modal-header h3 {
  margin: 0;
  font-size: 18px;
}

.drilldown-modal .close-btn {
  background: none;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
}

.drilldown-modal .modal-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}

.drilldown-modal .filter-row {
  display: flex;
  gap: 15px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.drilldown-modal .filter-row input,
.drilldown-modal .filter-row select {
  padding: 8px 12px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
}

.drilldown-modal .filter-row input[type="date"] {
  width: 150px;
}

.drilldown-modal .filter-row select {
  min-width: 150px;
}

.drilldown-modal table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.drilldown-modal th,
.drilldown-modal td {
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1px solid #eee;
}

.drilldown-modal th {
  background: #f8f9fa;
  font-weight: 600;
  color: #333;
}

.drilldown-modal tr:hover {
  background: #f8f9fa;
  cursor: pointer;
}

.drilldown-modal .amount {
  text-align: right;
  font-family: monospace;
}

.drilldown-modal .debit {
  color: #dc2626;
}

.drilldown-modal .credit {
  color: #16a34a;
}

.drilldown-modal .modal-footer {
  padding: 15px 20px;
  border-top: 1px solid #eee;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.drilldown-modal .btn {
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 14px;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
}

.drilldown-modal .btn-primary {
  background: #4f46e5;
  color: white;
}

.drilldown-modal .btn-primary:hover {
  background: #4338ca;
}

.drilldown-modal .btn-secondary {
  background: #e5e7eb;
  color: #333;
}

.drilldown-modal .btn-secondary:hover {
  background: #d1d5db;
}

.drilldown-modal .voucher-detail {
  display: none;
}

.drilldown-modal .voucher-detail.active {
  display: block;
}

.drilldown-modal .voucher-header {
  background: #f8f9fa;
  padding: 15px;
  border-radius: 4px;
  margin-bottom: 15px;
}

.drilldown-modal .voucher-header .row {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
}

.drilldown-modal .voucher-header label {
  font-weight: 600;
  color: #666;
  min-width: 100px;
}

.drilldown-modal .voucher-lines {
  margin-top: 15px;
}

.drilldown-modal .back-btn {
  margin-bottom: 15px;
}

.loading-spinner {
  text-align: center;
  padding: 40px;
  color: #666;
}
</style>

<div id="drilldown-modal" class="drilldown-modal">
  <div class="modal-content">
    <!-- Header -->
    <div class="modal-header">
      <h3 id="drilldown-title">Voucher Details</h3>
      <button class="close-btn" onclick="closeDrilldownModal()">&times;</button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <!-- Level 1: Voucher List -->
      <div id="voucher-list" class="voucher-list">
        <div class="filter-row">
          <input type="date" id="filter-start-date" placeholder="From Date">
          <input type="date" id="filter-end-date" placeholder="To Date">
          <select id="filter-voucher-type">
            <option value="">All Types</option>
            <option value="journal">Journal</option>
            <option value="payment">Payment</option>
            <option value="receipt">Receipt</option>
            <option value="contra">Contra</option>
            <option value="debitnote">Debit Note</option>
            <option value="creditnote">Credit Note</option>
          </select>
          <button class="btn btn-primary" onclick="applyDrilldownFilter()">Apply Filter</button>
        </div>

        <table id="voucher-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Voucher No</th>
              <th>Type</th>
              <th>Narration</th>
              <th class="amount">Debit</th>
              <th class="amount">Credit</th>
            </tr>
          </thead>
          <tbody id="voucher-tbody">
            <!-- Populated dynamically -->
          </tbody>
        </table>
      </div>

      <!-- Level 2: Voucher Detail -->
      <div id="voucher-detail" class="voucher-detail">
        <button class="btn btn-secondary back-btn" onclick="showVoucherList()">&larr; Back to List</button>
        
        <div class="voucher-header">
          <div class="row">
            <div>
              <label>Date:</label>
              <span id="detail-date"></span>
            </div>
            <div>
              <label>Voucher No:</label>
              <span id="detail-voucher-no"></span>
            </div>
            <div>
              <label>Type:</label>
              <span id="detail-type"></span>
            </div>
          </div>
          <div class="row">
            <div>
              <label>Narration:</label>
              <span id="detail-narration"></span>
            </div>
          </div>
        </div>

        <table class="voucher-lines-table">
          <thead>
            <tr>
              <th>Account Code</th>
              <th>Account Name</th>
              <th>Nature</th>
              <th class="amount">Debit</th>
              <th class="amount">Credit</th>
            </tr>
          </thead>
          <tbody id="detail-lines-tbody">
            <!-- Populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeDrilldownModal()">Close</button>
    </div>
  </div>
</div>

<script>
let currentAccountId = null;
let currentClientId = null;
let currentFy = null;
let vouchersCache = [];

// Open drill-down modal for an account
function openDrilldownModal(accountId, accountName, clientId, fy) {
  currentAccountId = accountId;
  currentClientId = clientId;
  currentFy = fy || '2024-25';
  
  document.getElementById('drilldown-title').textContent = 'Vouchers for: ' + accountName;
  document.getElementById('drilldown-modal').classList.add('active');
  
  // Reset filters
  document.getElementById('filter-start-date').value = '';
  document.getElementById('filter-end-date').value = '';
  document.getElementById('filter-voucher-type').value = '';
  
  // Load vouchers
  loadVouchersForAccount(accountId, clientId, currentFy);
}

// Load vouchers for an account
async function loadVouchersForAccount(accountId, clientId, fy, filters = {}) {
  const tbody = document.getElementById('voucher-tbody');
  tbody.innerHTML = '<tr><td colspan="6" class="loading-spinner">Loading vouchers...</td></tr>';
  
  try {
    const token = localStorage.getItem('token');
    let url = `/api/reports/vouchers/by-account/${accountId}?fy=${fy}`;
    
    if (filters.startDate) url += `&startDate=${filters.startDate}`;
    if (filters.endDate) url += `&endDate=${filters.endDate}`;
    if (filters.voucherType) url += `&voucherType=${filters.voucherType}`;
    
    const response = await fetch(url, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const vouchers = await response.json();
    vouchersCache = vouchers;
    
    renderVoucherList(vouchers);
  } catch (err) {
    console.error('Error loading vouchers:', err);
    tbody.innerHTML = '<tr><td colspan="6" class="loading-spinner">Error loading vouchers</td></tr>';
  }
}

// Render voucher list
function renderVoucherList(vouchers) {
  const tbody = document.getElementById('voucher-tbody');
  
  if (!vouchers || vouchers.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="loading-spinner">No vouchers found</td></tr>';
    return;
  }
  
  tbody.innerHTML = vouchers.map(v => `
    <tr onclick="viewVoucherDetail('${v.id}')">
      <td>${formatDate(v.date)}</td>
      <td>${v.voucher_no}</td>
      <td>${v.voucher_type}</td>
      <td>${v.narration || '-'}</td>
      <td class="amount debit">${v.debit > 0 ? formatNumber(v.debit) : '-'}</td>
      <td class="amount credit">${v.credit > 0 ? formatNumber(v.credit) : '-'}</td>
    </tr>
  `).join('');
}

// View voucher detail (Level 2)
async function viewVoucherDetail(voucherId) {
  try {
    const token = localStorage.getItem('token');
    const response = await fetch(`/api/reports/vouchers/${voucherId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const voucher = await response.json();
    
    // Populate detail view
    document.getElementById('detail-date').textContent = formatDate(voucher.date);
    document.getElementById('detail-voucher-no').textContent = voucher.voucher_no;
    document.getElementById('detail-type').textContent = voucher.voucher_type;
    document.getElementById('detail-narration').textContent = voucher.narration || '-';
    
    // Populate lines
    const linesTbody = document.getElementById('detail-lines-tbody');
    linesTbody.innerHTML = voucher.lines.map(line => `
      <tr>
        <td>${line.account_code || '-'}</td>
        <td>${line.account_name || '-'}</td>
        <td>${line.account_nature || '-'}</td>
        <td class="amount debit">${line.debit > 0 ? formatNumber(line.debit) : '-'}</td>
        <td class="amount credit">${line.credit > 0 ? formatNumber(line.credit) : '-'}</td>
      </tr>
    `).join('');
    
    // Show detail view
    document.getElementById('voucher-list').style.display = 'none';
    document.getElementById('voucher-detail').classList.add('active');
  } catch (err) {
    console.error('Error loading voucher detail:', err);
  }
}

// Back to voucher list
function showVoucherList() {
  document.getElementById('voucher-detail').classList.remove('active');
  document.getElementById('voucher-list').style.display = 'block';
}

// Apply filter
function applyDrilldownFilter() {
  const startDate = document.getElementById('filter-start-date').value;
  const endDate = document.getElementById('filter-end-date').value;
  const voucherType = document.getElementById('filter-voucher-type').value;
  
  loadVouchersForAccount(currentAccountId, currentClientId, currentFy, {
    startDate,
    endDate,
    voucherType
  });
}

// Close modal
function closeDrilldownModal() {
  document.getElementById('drilldown-modal').classList.remove('active');
  showVoucherList();
}

// Helper functions
function formatDate(dateStr) {
  if (!dateStr) return '-';
  const date = new Date(dateStr);
  return date.toLocaleDateString('en-IN');
}

function formatNumber(num) {
  if (!num && num !== 0) return '-';
  return new Intl.NumberFormat('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
}

// Close modal on outside click
document.getElementById('drilldown-modal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeDrilldownModal();
  }
});
</script>
