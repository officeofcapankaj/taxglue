<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Reconciliation | TaxGlue</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f8fafc; color: #1e293b; }
    .container { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: linear-gradient(180deg, #1e3a5f 0%, #0f172a 100%); color: white; padding: 0; position: fixed; height: 100vh; overflow-y: auto; }
    .sidebar-header { padding: 24px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .logo { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .sidebar-nav { padding: 20px 12px; }
    .nav-section { margin-bottom: 24px; }
    .nav-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); padding: 0 12px; margin-bottom: 8px; }
    .sidebar a { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.8); text-decoration: none; padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .sidebar a:hover { background: rgba(255,255,255,0.1); color: white; }
    .sidebar a.active { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .main { flex: 1; margin-left: 260px; }
    .topbar { background: white; padding: 16px 32px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .page-title { font-size: 20px; font-weight: 600; }
    .btn-back { background: #f1f5f9; color: #475569; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .btn-back:hover { background: #e2e8f0; }
    .content { padding: 32px; }
    .select-group { display: flex; gap: 16px; margin-bottom: 24px; }
    .form-group { flex: 1; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .form-select { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; background: white; }
    .form-select:focus { outline: none; border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1); }
    .toolbar { display: flex; gap: 12px; margin-bottom: 24px; }
    .btn { padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .btn-primary { background: #22c55e; color: white; }
    .btn-primary:hover { background: #16a34a; }
    .btn-secondary { background: #3b82f6; color: white; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
    .stat-label { font-size: 13px; color: #64748b; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-value.positive { color: #16a34a; }
    .stat-value.negative { color: #dc2626; }
    .filter-chips { display: flex; gap: 8px; margin-bottom: 16px; }
    .filter-chip { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #e2e8f0; background: white; transition: all 0.2s; }
    .filter-chip:hover { border-color: #22c55e; }
    .filter-chip.active { background: #22c55e; color: white; border-color: #22c55e; }
    .table-container { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 14px 16px; text-align: left; font-size: 13px; font-weight: 600; color: #475569; border-bottom: 1px solid #e2e8f0; }
    td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    tr:hover { background: #f8fafc; }
    .amount { text-align: right; }
    .amount-credit { color: #16a34a; }
    .amount-debit { color: #dc2626; }
    .tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .tag-success { background: #dcfce7; color: #16a34a; }
    .tag-warning { background: #fef3c7; color: #b45309; }
    .tag-info { background: #dbeafe; color: #1d4ed8; }
    .empty-state { text-align: center; padding: 48px; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="sidebar">
      <div class="sidebar-header"><div class="logo"><div class="logo-icon">📒</div>TaxGlue</div></div>
      <div class="sidebar-nav">
        <div class="nav-section"><div class="nav-section-title">Main</div>
          <a href="/app/dashboard.html">🏠 Dashboard</a>
          <a href="/app/clients.html">👥 Clients</a>
        </div>
        <div class="nav-section"><div class="nav-section-title">Accounting</div>
          <a href="/modules/bookkeeping.html">📒 Book-Keeping</a>
          <a href="/modules/trial-balance.html">📊 Trial Balance</a>
          <a href="/modules/financial-statements.html">⚖️ Financial Statements</a>
        </div>
      </div>
    </nav>
    
    <main class="main">
      <header class="topbar">
        <h1 class="page-title">🏦 Bank Reconciliation</h1>
        <a href="/modules/bookkeeping.html" class="btn-back">← Back to Book-Keeping</a>
      </header>
      
      <div class="content">
        <div class="select-group">
          <div class="form-group">
            <label class="form-label">Select Client</label>
            <select class="form-select" id="clientSelect" onchange="loadClientData()">
              <option value="">-- Select Client --</option>
              <option value="demo-1">Singla Steel Corporation</option>
              <option value="demo-2">Rana Industries</option>
              <option value="demo-3">Sharma Traders</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Bank Account</label>
            <select class="form-select" id="bankSelect" onchange="loadBankFeed()">
              <option value="hdfc">HDFC Bank</option>
              <option value="icici">ICICI Bank</option>
              <option value="sbi">SBI Bank</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Financial Year</label>
            <select class="form-select" id="fySelect">
              <option value="2024-25">2024-25</option>
              <option value="2023-24">2023-24</option>
            </select>
          </div>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Matched</div>
            <div class="stat-value positive" id="bankMatched">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pending</div>
            <div class="stat-value negative" id="bankUnmatched">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Suggested</div>
            <div class="stat-value" id="bankSuggested">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total</div>
            <div class="stat-value" id="bankTotal">₹0</div>
          </div>
        </div>
        
        <div class="toolbar">
          <button class="btn btn-secondary" onclick="connectBank()">🔗 Connect Bank</button>
          <button class="btn btn-primary" onclick="reconcileSelected()">✓ Reconcile Selected</button>
        </div>
        
        <div class="filter-chips">
          <button class="filter-chip active" onclick="filterBankFeed('all', this)">All</button>
          <button class="filter-chip" onclick="filterBankFeed('matched', this)">Matched</button>
          <button class="filter-chip" onclick="filterBankFeed('unmatched', this)">Pending</button>
        </div>
        
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 40px;"></th>
                <th>Date</th>
                <th>Description</th>
                <th style="text-align: right;">Amount</th>
                <th>Voucher</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="bankFeedTable">
              <tr><td colspan="7" class="empty-state">Select a client and bank to view transactions</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    let bankFeedData = []
    let currentFilter = 'all'
    
    function loadClientData() {
      loadBankFeed()
    }
    
    function loadBankFeed() {
      const tbody = document.getElementById('bankFeedTable')
      if (!document.getElementById('clientSelect').value) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Select a client and bank to view transactions</td></tr>'
        return
      }
      
      // Demo data for demonstration
      bankFeedData = [
        { id: 1, date: '2025-03-28', description: 'Received from ABC Corp', amount: 50000, type: 'credit', matched: true, voucher: 'PV-001' },
        { id: 2, date: '2025-03-27', description: 'Payment to XYZ Suppliers', amount: 25000, type: 'debit', matched: true, voucher: 'PP-002' },
        { id: 3, date: '2025-03-26', description: 'Bank Charges', amount: 500, type: 'debit', matched: false, voucher: null },
        { id: 4, date: '2025-03-25', description: 'Received from Customer - Sharma', amount: 75000, type: 'credit', matched: false, voucher: null },
        { id: 5, date: '2025-03-24', description: 'EMI - HDFC Bank', amount: 125000, type: 'debit', matched: true, voucher: 'JV-005' },
        { id: 6, date: '2025-03-23', description: 'NEFT - Johnson Ltd', amount: 45000, type: 'debit', matched: false, voucher: null },
        { id: 7, date: '2025-03-22', description: 'Internet Banking Transfer', amount: 15000, type: 'credit', matched: false, voucher: null }
      ]
      
      renderBankFeed(bankFeedData)
      updateBankStats()
    }
    
    function renderBankFeed(data) {
      const tbody = document.getElementById('bankFeedTable')
      
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No bank transactions found</td></tr>'
        return
      }
      
      let selectedFilter = currentFilter
      let filtered = selectedFilter === 'all' ? data : data.filter(d => {
        if (selectedFilter === 'matched') return d.matched
        if (selectedFilter === 'unmatched') return !d.matched
        return true
      })
      
      tbody.innerHTML = filtered.map(item => `
        <tr class="${item.matched ? 'bank-matched' : 'bank-unmatched'}">
          <td><input type="checkbox" class="bank-checkbox" ${item.matched ? 'checked' : ''}></td>
          <td>${item.date}</td>
          <td>${item.description}</td>
          <td class="amount ${item.type === 'debit' ? 'amount-debit' : 'amount-credit'}">${item.type === 'debit' ? '-' : ''}₹${item.amount.toLocaleString()}</td>
          <td>${item.voucher || '-'}</td>
          <td>${item.matched ? '<span class="tag tag-success">Matched</span>' : '<span class="tag tag-warning">Pending</span>'}</td>
          <td>${item.matched ? '<button class="btn btn-outline" style="padding: 4px 8px;" onclick="unmatch(${item.id})">Unmatch</button>' : '<button class="btn btn-primary" style="padding: 4px 8px;" onclick="match(${item.id})">Match</button>'}</td>
        </tr>
      `).join('')
    }
    
    function updateBankStats() {
      const matched = bankFeedData.filter(d => d.matched).length
      const unmatched = bankFeedData.filter(d => !d.matched).length
      const suggested = 2
      
      document.getElementById('bankMatched').textContent = matched
      document.getElementById('bankUnmatched').textContent = unmatched
      document.getElementById('bankSuggested').textContent = suggested
      
      const total = bankFeedData.reduce((sum, d) => sum + d.amount, 0)
      document.getElementById('bankTotal').textContent = '₹' + total.toLocaleString()
    }
    
    function filterBankFeed(filter, element) {
      if (element) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'))
        element.classList.add('active')
        currentFilter = filter
      }
      
      renderBankFeed(bankFeedData)
    }
    
    function match(id) {
      alert('Match transaction #' + id + ' - This would open a modal to select the voucher to match against.')
    }
    
    function unmatch(id) {
      const item = bankFeedData.find(d => d.id === id)
      if (item) {
        item.matched = false
        renderBankFeed(bankFeedData)
        updateBankStats()
      }
    }
    
    function connectBank() {
      alert('🔗 Connect Bank Account\n\nThis would integrate with your bank to automatically fetch bank statements.')
    }
    
    function reconcileSelected() {
      alert('✓ Reconciling selected transactions...\n\nThis would match selected bank transactions with vouchers.')
    }
  </script>
</body>
</html>
