<div class="container">

<a href="index.html">Dashboard</a>
<a href="clients.html">Clients</a>
<a href="#">Accounting</a>

<div class="main">

<div class="topbar">

<h3>Clients</h3>

</div>

<div class="content">

<h3>Add Client</h3>

<input id="name" placeholder="Client Name">
<input id="pan" placeholder="PAN">
<input id="gstin" placeholder="GSTIN">

<button onclick="addClient()">Add Client</button>

<h3>Client List</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>PAN</th>
<th>GSTIN</th>
</tr>
</thead>

<tbody id="clientTable"></tbody>

</table>

</div>

</div>

</div>


<script>

let clients = JSON.parse(localStorage.getItem("clients")) || []

function addClient(){

let name = document.getElementById("name").value
let pan = document.getElementById("pan").value
let gstin = document.getElementById("gstin").value

clients.push({name,pan,gstin})

localStorage.setItem("clients", JSON.stringify(clients))

renderClients()

}

function renderClients(){

let table = document.getElementById("clientTable")

table.innerHTML=""

clients.forEach(c => {

let row = `<tr>
<td>${c.name}</td>
<td>${c.pan}</td>
<td>${c.gstin}</td>
</tr>`

table.innerHTML += row

})

}

renderClients()

</script>

</body>
