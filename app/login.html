<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button id="signupBtn">Sign Up</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>

<script>
window.onerror = function(msg, url, line) {
  alert("Error: " + msg + " at line " + line)
}

var supabase = null

async function init() {
  alert("In init function")
  
  const { createClient } = window.SupabaseClient || window.supabase
  alert("Got supabase: " + (createClient ? "YES" : "NO"))
  
  if (!createClient) {
    alert("ERROR: Supabase not loaded!")
    return
  }
  
  supabase = createClient(
    "https://jgjeuybgideeqcjxvlmn.supabase.co",
    "sb_publishable_8nwimD4up__9jnxr6RoDpg_8_Gy5w7j"
  )
  
  alert("Supabase client created!")
  
  document.getElementById("loginBtn").onclick = async () => {
    alert("Button clicked!")
    
    var email = document.getElementById("email").value
    var password = document.getElementById("password").value
    
    alert("Login with: " + email)
    
    var result = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    })
    
    alert("Result: " + (result.error ? result.error.message : "OK"))
    
    if(result.error){
      alert(result.error.message)
      return
    }
    
    window.location.href="/app/dashboard.html"
  }
  
  document.getElementById("signupBtn").onclick = async () => {
    var email = document.getElementById("email").value
    var password = document.getElementById("password").value
    
    var result = await supabase.auth.signUp({
      email: email,
      password: password
    })
    
    if(result.error){
      alert(result.error.message)
      return
    }
    
    alert("Account created. You can now login.")
  }
  
  alert("Ready!")
}

alert("Script running...")
init()
</script>
