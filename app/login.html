<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button id="signupBtn">Sign Up</button>

<script>
window.onerror = function(msg, url, line) {
  alert("TOP-LEVEL Error: " + msg + " at line " + line)
  return true
}

alert("TOP: Script starting")

async function init() {
  alert("Loading Supabase...")
  
  try {
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm")
    alert("Supabase loaded!")
    
    const supabase = createClient(
      "https://jgjeuybgideeqcjxvlmn.supabase.co",
      "sb_publishable_8nwimD4up__9jnxr6RoDpg_8_Gy5w7j"
    )
    
    alert("Client created!")
    
    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value
      
      alert("Login with: " + email)
      
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      })
      
      alert("Result: " + (error ? error.message : "OK"))
      
      if (error) {
        alert(error.message)
        return
      }
      
      window.location.href = "/app/dashboard.html"
    }
    
    document.getElementById("signupBtn").onclick = async () => {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value
      
      const { error } = await supabase.auth.signUp({
        email: email,
        password: password
      })
      
      if (error) {
        alert(error.message)
        return
      }
      
      alert("Account created. You can now login.")
    }
    
    alert("Ready!")
  } catch(e) {
    alert("Error: " + e.message)
  }
}

alert("Calling init...")
init()
</script>
