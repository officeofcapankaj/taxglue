<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button id="signupBtn">Sign Up</button>

<div id="debug" style="background:#eee;padding:10px;margin:10px 0;font-family:monospace;font-size:12px;"></div>

<script type="module">
function log(msg) {
  const div = document.getElementById("debug")
  div.innerHTML += "<div>" + msg + "</div>"
  console.log(msg)
}

log("Script starting...")

async function init() {
  log("Loading Supabase...")
  
  try {
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm")
    log("Supabase loaded!")
    
    const supabase = createClient(
      "https://jgjeuybgideeqcjxvlmn.supabase.co",
      "sb_publishable_8nwimD4up__9jnxr6RoDpg_8_Gy5w7j"
    )
    
    log("Client created!")
    
    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value
      
      log("Login with: " + email)
      
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      })
      
      log("Result: " + (error ? error.message : "OK"))
      
      if (error) {
        alert(error.message)
        return
      }
      
      window.location.href = "/app/dashboard.html"
    }
    
    document.getElementById("signupBtn").onclick = async () => {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value
      
      const { error } = await supabase.auth.signUp({
        email: email,
        password: password
      })
      
      if (error) {
        alert(error.message)
        return
      }
      
      alert("Account created. You can now login.")
    }
    
    log("Ready!")
  } catch(e) {
    log("Error: " + e.message)
  }
}

log("Calling init...")
init()
</script>
