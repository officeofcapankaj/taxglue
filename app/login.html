<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - TaxGlue</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-container {
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 420px;
  padding: 40px;
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.logo {
  font-size: 32px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 8px;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.login-title {
  font-size: 24px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 4px;
}

.login-subtitle {
  font-size: 14px;
  color: #64748b;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: #374151;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  transition: all 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: #22c55e;
  box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
}

.form-input::placeholder {
  color: #94a3b8;
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
}

.btn-secondary {
  width: 100%;
  padding: 14px;
  background: white;
  color: #374151;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: #f8fafc;
  border-color: #cbd5e1;
}

.btn-demo {
  width: 100%;
  padding: 12px;
  background: #f0f9ff;
  color: #0369a1;
  border: 1px dashed #38bdf8;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-demo:hover {
  background: #e0f2fe;
  border-color: #0ea5e9;
}

.divider {
  display: flex;
  align-items: center;
  margin: 24px 0;
  color: #94a3b8;
  font-size: 13px;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

.divider span {
  padding: 0 12px;
}

.error-message {
  background: #fee2e2;
  color: #dc2626;
  padding: 12px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

.error-message.show {
  display: block;
}

.footer-text {
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: #64748b;
}

.footer-text a {
  color: #22c55e;
  text-decoration: none;
  font-weight: 500;
}

.footer-text a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>
<div class="login-container">
  <div class="login-header">
    <div class="logo">
      <div class="logo-icon">📊</div>
      TaxGlue
    </div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to your account to continue</p>
  </div>
  
  <div class="error-message" id="errorMessage"></div>
  
  <form id="loginForm">
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        class="form-input" 
        placeholder="you@company.com"
        required
      >
    </div>
    
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input 
        type="password" 
        id="password" 
        class="form-input" 
        placeholder="••••••••"
        required
      >
    </div>
    
    <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
    <button type="button" class="btn-secondary" id="signupBtn">Create Account</button>
    <button type="button" class="btn-demo" id="demoBtn">Try Demo (No Login)</button>
  </form>
  
  <div class="divider">
    <span>or</span>
  </div>
  
  <p class="footer-text">
    Trusted by 500+ Chartered Accountants
  </p>
</div>

<script type="module">
async function init() {
  try {
    const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm")
    
    const supabase = createClient(
      "https://jgjeuybgideeqcjxvlmn.supabase.co",
      "sb_publishable_8nwimD4up__9jnxr6RoDpg_8_Gy5w7j"
    )
    
    const loginForm = document.getElementById("loginForm")
    const errorMessage = document.getElementById("errorMessage")
    
    function showError(msg) {
      errorMessage.textContent = msg
      errorMessage.classList.add("show")
    }
    
    function hideError() {
      errorMessage.classList.remove("show")
    }
    
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault()
      hideError()
      
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value
      
      document.getElementById("loginBtn").textContent = "Signing in..."
      
      // Demo login - bypass Supabase auth for specific demo credentials
      if (email === 'singlacapankaj@gmail.com' && password === '1234') {
        const demoUser = {
          id: "demo-capankaj",
          email: "singlacapankaj@gmail.com",
          user_metadata: { name: "C Pankaj" }
        }
        localStorage.setItem('supabase.auth.token', JSON.stringify({
          access_token: "demo_token",
          user: demoUser
        }))
        localStorage.setItem('userEmail', demoUser.email)
        localStorage.setItem('userName', "C Pankaj")
        window.location.href = "/app/dashboard.html"
        return
      }
      
      const { error } = await supabase.auth.signInWithPassword({
        email,
        password
      })
      
      if (error) {
        showError(error.message)
        document.getElementById("loginBtn").textContent = "Sign In"
        return
      }
      
      window.location.href = "/app/dashboard.html"
    })
    
    document.getElementById("signupBtn").addEventListener("click", async () => {
      hideError()
      
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value
      
      if (!email || !password) {
        showError("Please enter email and password")
        return
      }
      
      document.getElementById("signupBtn").textContent = "Creating account..."
      
      const { error } = await supabase.auth.signUp({
        email,
        password
      })
      
      if (error) {
        showError(error.message)
        document.getElementById("signupBtn").textContent = "Create Account"
        return
      }
      
      alert("Account created! Please check your email to verify, then sign in.")
      document.getElementById("signupBtn").textContent = "Create Account"
    })
    
    // Demo mode - bypass auth for testing
    document.getElementById("demoBtn")?.addEventListener("click", () => {
      // Create demo session data
      const demoUser = {
        id: "demo-user-id",
        email: "demo@taxglue.com",
        user_metadata: { name: "Demo User" }
      }
      localStorage.setItem('supabase.auth.token', JSON.stringify({
        access_token: "demo_token",
        user: demoUser
      }))
      localStorage.setItem('userEmail', demoUser.email)
      localStorage.setItem('userName', "Demo User")
      window.location.href = "/app/dashboard.html"
    })
    
  } catch(e) {
    console.error("Error initializing:", e)
  }
}

init()
</script>
</body>
</html>
