<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="TaxGlue - Practice Management Platform for Chartered Accountants">
<title>Login - TaxGlue</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-container {
  background: white;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 420px;
  padding: 40px;
}

.login-header {
  text-align: center;
  margin-bottom: 32px;
}

.logo {
  font-size: 32px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 8px;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.login-title {
  font-size: 24px;
  font-weight: 600;
  color: #1e293b;
  margin-bottom: 4px;
}

.login-subtitle {
  font-size: 14px;
  color: #64748b;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: #374151;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  transition: all 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: #22c55e;
  box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
}

.form-input::placeholder {
  color: #94a3b8;
}

.btn-primary {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
}

.btn-secondary {
  width: 100%;
  padding: 14px;
  background: white;
  color: #374151;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: #f8fafc;
  border-color: #cbd5e1;
}

.btn-demo {
  width: 100%;
  padding: 12px;
  background: #f0f9ff;
  color: #0369a1;
  border: 1px dashed #38bdf8;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn-demo:hover {
  background: #e0f2fe;
  border-color: #0ea5e9;
}

.divider {
  display: flex;
  align-items: center;
  margin: 24px 0;
  color: #94a3b8;
  font-size: 13px;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #e2e8f0;
}

.divider span {
  padding: 0 12px;
}

.error-message {
  background: #fee2e2;
  color: #dc2626;
  padding: 12px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

.error-message.show {
  display: block;
}

.footer-text {
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: #64748b;
}

.footer-text a {
  color: #22c55e;
  text-decoration: none;
  font-weight: 500;
}

.footer-text a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>
<div class="login-container">
  <div class="login-header">
    <div class="logo">
      <div class="logo-icon">📊</div>
      TaxGlue
    </div>
    <h1 class="login-title">Welcome back</h1>
    <p class="login-subtitle">Sign in to your account to continue</p>
  </div>
  
  <div class="error-message" id="errorMessage"></div>
  
  <form id="loginForm" aria-label="Sign in to your account">
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        class="form-input" 
        placeholder="you@company.com"
        autocomplete="email"
        required
        aria-required="true"
      >
    </div>
    
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input 
        type="password" 
        id="password" 
        class="form-input" 
        placeholder="••••••••"
        autocomplete="current-password"
        required
        aria-required="true"
      >
    </div>
    
    <button type="submit" class="btn-primary" id="loginBtn" aria-describedby="errorMessage">Sign In</button>
    <button type="button" class="btn-secondary" id="signupBtn">Create Account</button>
    <button type="button" class="btn-demo" id="demoBtn" aria-describedby="demoDesc">Try Demo (No Login)</button>
  </form>
  
  <p id="demoDesc" class="visually-hidden">Try a demo of TaxGlue without creating an account</p>
  
  <div class="divider">
    <span>or</span>
  </div>
  
  <p class="footer-text">
    Trusted by 500+ Chartered Accountants
  </p>
</div>

<script type="module">
async function init() {
  try {
    // Import config - credentials come from environment variables only
    const { supabase } = await import("./config.js")
    
    const loginForm = document.getElementById("loginForm")
    const errorMessage = document.getElementById("errorMessage")
    const loginBtn = document.getElementById("loginBtn")
    const signupBtn = document.getElementById("signupBtn")
    const demoBtn = document.getElementById("demoBtn")
    
    // Loading state helper
    function setLoading(button, isLoading, originalText) {
      button.disabled = isLoading
      button.textContent = isLoading ? 'Please wait...' : originalText
    }
    
    // Error display helpers
    function showError(msg) {
      errorMessage.textContent = msg
      errorMessage.classList.add("show")
    }
    
    function hideError() {
      errorMessage.classList.remove("show")
    }
    
    // Validate email format
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)
    }
    
    // Validate password
    function isValidPassword(password) {
      return password && password.length >= 6
    }
    
    // Login form handler
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault()
      hideError()
      
      const email = document.getElementById("email").value.trim()
      const password = document.getElementById("password").value
      
      // Client-side validation
      if (!email || !password) {
        showError("Please enter email and password")
        return
      }
      
      if (!isValidEmail(email)) {
        showError("Please enter a valid email address")
        return
      }
      
      setLoading(loginBtn, true, "Sign In")
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        })
        
        if (error) {
          showError(error.message)
          setLoading(loginBtn, false, "Sign In")
          return
        }
        
        // Store user info
        localStorage.setItem('userEmail', email)
        localStorage.setItem('userName', data.user?.user_metadata?.name || email.split('@')[0])
        
        // Redirect to dashboard
        window.location.href = "/app/dashboard.html"
      } catch (err) {
        console.error("Login error:", err)
        showError("An unexpected error occurred. Please try again.")
        setLoading(loginBtn, false, "Sign In")
      }
    })
    
    // Signup handler
    signupBtn.addEventListener("click", async () => {
      hideError()
      
      const email = document.getElementById("email").value.trim()
      const password = document.getElementById("password").value
      
      if (!email || !password) {
        showError("Please enter email and password")
        return
      }
      
      if (!isValidEmail(email)) {
        showError("Please enter a valid email address")
        return
      }
      
      if (!isValidPassword(password)) {
        showError("Password must be at least 6 characters")
        return
      }
      
      setLoading(signupBtn, true, "Create Account")
      
      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password
        })
        
        if (error) {
          showError(error.message)
          setLoading(signupBtn, false, "Create Account")
          return
        }
        
        if (data.user) {
          alert("Account created! Please check your email to verify, then sign in.")
        } else {
          alert("Check your email to confirm your account, then sign in.")
        }
        setLoading(signupBtn, false, "Create Account")
      } catch (err) {
        console.error("Signup error:", err)
        showError("An unexpected error occurred. Please try again.")
        setLoading(signupBtn, false, "Create Account")
      }
    })
    
    // Demo mode - check Supabase connection first
    demoBtn?.addEventListener("click", async () => {
      setLoading(demoBtn, true, "Loading Demo...")
      
      try {
        // Check if Supabase is available
        const { data: testData, error: testError } = await supabase.from('clients').select('id').limit(1)
        
        if (testError && testError.message.includes('Failed to fetch')) {
          alert("Demo unavailable. Please connect to the internet and try again.")
          setLoading(demoBtn, false, "Try Demo (No Login)")
          return
        }
        
        // Create demo session
        const demoUser = {
          id: "demo-user-" + Date.now(),
          email: "demo@taxglue.in",
          user_metadata: { name: "Demo User" },
          is_demo: true
        }
        
        localStorage.setItem('supabase.auth.token', JSON.stringify({
          access_token: "demo_token_" + Date.now(),
          user: demoUser
        }))
        localStorage.setItem('userEmail', demoUser.email)
        localStorage.setItem('userName', demoUser.user_metadata.name)
        localStorage.setItem('isDemo', 'true')
        
        window.location.href = "/app/dashboard.html"
      } catch (err) {
        console.error("Demo error:", err)
        showError("Demo mode is temporarily unavailable.")
        setLoading(demoBtn, false, "Try Demo (No Login)")
      }
    })
    
  } catch(e) {
    console.error("Error initializing:", e)
    document.getElementById("errorMessage").textContent = "Configuration error. Please contact support."
    document.getElementById("errorMessage").classList.add("show")
  }
}

init()
</script>
</body>
</html>
