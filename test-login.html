<!DOCTYPE html>
<html>
<head>
  <title>Test Login</title>
</head>
<body>
  <h1>Test Login</h1>
  <input id="email" placeholder="Email" value="testuser@test.com"><br>
  <input id="password" type="password" placeholder="Password" value="TestPass123"><br>
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>
  <pre id="output" style="background:#eee;padding:10px;margin-top:20px;"></pre>

  <script type="module">
    const output = document.getElementById('output')
    output.textContent = 'Loading config.js...'
    
    try {
      const { createClient } = await import("https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm")
      output.textContent = 'Supabase loaded, creating client...'
      
      const supabase = createClient(
        "https://jgjeuybgideeqcjxvlmn.supabase.co",
        "sb_publishable_8nwimD4up__9jnxr6RoDpg_8_Gy5w7j"
      )
      
      output.textContent = 'Client created. Testing login...'
      
      document.getElementById("loginBtn").onclick = async () => {
        output.textContent = 'Login clicked, calling Supabase...'
        
        const email = document.getElementById("email").value
        const password = document.getElementById("password").value
        
        try {
          const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
          })
          
          if (error) {
            output.textContent = 'ERROR: ' + error.message
          } else {
            output.textContent = 'SUCCESS! Logged in as: ' + JSON.stringify(data.user)
          }
        } catch (e) {
          output.textContent = 'EXCEPTION: ' + e.message
        }
      }
      
      output.textContent = 'Ready. Click Login.'
    } catch (e) {
      output.textContent = 'ERROR loading: ' + e.message
    }
  </script>
</body>
</html>
