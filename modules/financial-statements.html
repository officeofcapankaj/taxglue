async function loadClients() {
  try {
    const { data } = await supabase.from('clients').select('id, name, constitution')
    if (data) {
      clients = data
      const select = document.getElementById('clientSelect')
      data.forEach(c => {
        const opt = document.createElement('option')
        opt.value = c.id
        opt.textContent = c.name + ' (' + c.constitution + ')'
        select.appendChild(opt)
      })
    }
  } catch (e) {
    // Try localStorage
    const localClients = JSON.parse(localStorage.getItem('clients')) || []
    const select = document.getElementById('clientSelect')
    localClients.forEach(c => {
      const opt = document.createElement('option')
      opt.value = c.id
      opt.textContent = c.name + ' (' + c.constitution + ')'
      select.appendChild(opt)
    })
  }
}

function loadClientData() {
  const clientId = document.getElementById('clientSelect').value
  const fy = document.getElementById('fySelect').value
  if (!clientId) {
    document.getElementById('reportContainer').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📊</div><p>Please select a client to view financial statements</p></div>'
    return
  }
  renderReport()
}

function switchReport() {
  const type = document.getElementById('reportType').value
  switchReportType(type)
}

function switchReportType(type) {
  currentReport = type
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelector('[onclick="switchReportType(\'' + type + '\')"]').classList.add('active')
  document.getElementById('reportType').value = type
  renderReport()
}

function formatCurrency(amount) {
  if (amount === undefined || amount === null || amount === '') return '-'
  return new Intl.NumberFormat('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount)
}

function getClientName() {
  const clientId = document.getElementById('clientSelect').value
  const client = clients.find(c => c.id == clientId)
  return client ? client.name : ''
}

function getFY() {
  return document.getElementById('fySelect').value
}

function renderReport() {
  const container = document.getElementById('reportContainer')
  const clientName = getClientName()
  const fy = getFY()
  
  if (currentReport === 'bs') {
    container.innerHTML = renderBalanceSheet(clientName, fy)
  } else if (currentReport === 'pl') {
    container.innerHTML = renderPL(clientName, fy)
  } else if (currentReport === 'cf') {
    container.innerHTML = renderCashFlow(clientName, fy)
  } else if (currentReport === 'notes') {
    container.innerHTML = renderNotes(clientName, fy)
  }
}

function renderBalanceSheet(clientName, fy) {
  let html = `
  <div class="report-card" id="printableReport">
    <div class="report-title"><strong>BALANCE SHEET</strong></div>
    <div class="report-subtitle">${clientName}</div>
    <div class="report-subtitle">For the year ended 31st March, ${fy.split('-')[1]}</div>
    <table class="report-table">
      <thead>
        <tr>
          <th style="width:60px;">Sch.</th>
          <th>Particulars</th>
          <th style="width:150px;text-align:right;">Note No.</th>
          <th style="width:150px;text-align:right;">${fy.split('-')[0]}</th>
          <th style="width:150px;text-align:right;">${parseInt(fy.split('-')[0]) - 1}-${(parseInt(fy.split('-')[0]) - 1).toString().slice(-2)}</th>
        </tr>
      </thead>
      <tbody>`
  
  // Equity & Liabilities
  html += `<tr class="section-header"><td colspan="5">${BS_STRUCTURE.assets.nonCurrentAssets[0].name}</td></tr>`
  BS_STRUCTURE.assets.nonCurrentAssets.slice(1).forEach(item => {
    if (item.isSection) {
      html += `<tr class="section-header"><td>${item.code}</td><td colspan="4">${item.name}</td></tr>`
    } else if (item.isTotal) {
      html += `<tr class="total-row"><td></td><td>${item.name}</td><td></td><td class="amount">-</td><td class="amount">-</td></tr>`
    } else {
      html += `<tr><td>${item.code}</td><td class="indent-${item.indent || 0}">${item.name}</td><td></td><td class="amount">-</td><td class="amount">-</td></tr>`
    }
  })
  
  // Assets
  html += `<tr class="section-header"><td colspan="5">${BS_STRUCTURE.assets.currentAssets[0].name}</td></tr>`
  BS_STRUCTURE.assets.currentAssets.slice(1).forEach(item => {
    if (item.isSection) {
      html += `<tr class="section-header"><td>${item.code}</td><td colspan="4">${item.name}</td></tr>`
    } else if (item.isTotal) {
      html += `<tr class="total-row"><td></td><td>${item.name}</td><td></td><td class="amount">-</td><td class="amount">-</td></tr>`
    } else {

    }
  })
  
  html += `</tbody></table></div>`
  return html
}

      <div class="note-item">

  </div>`
}

function exportReport(format) {
  const clientName = getClientName()
  const fy = getFY()
  const reportType = currentReport === 'bs' ? 'Balance Sheet' : currentReport === 'pl' ? 'Profit and Loss' : currentReport === 'cf' ? 'Cash Flow' : 'Notes to Accounts'
  
  if (format === 'excel') {
    const wb = XLSX.utils.book_new()
    const ws = XLSX.utils.aoa_to_sheet([[`${reportType} - ${clientName}`], [`FY: ${fy}`], []])
    XLSX.utils.book_append_sheet(wb, ws, 'Report')
    XLSX.writeFile(wb, `${clientName}_${reportType}_${fy}.xlsx`)
  } else if (format === 'pdf') {
    window.print()
  } else if (format === 'word') {
    const content = document.getElementById('printableReport').innerHTML
    const blob = new Blob([`<html><body>${content}</body></html>`], { type: 'application/msword' })
    const link = document.createElement('a')
    link.href = URL.createObjectURL(blob)
    link.download = `${clientName}_${reportType}_${fy}.doc`
    link.click()
  }
}

// Initialize
loadClients()
