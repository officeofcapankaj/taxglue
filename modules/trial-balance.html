<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trial Balance | TaxGlue</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8fafc;
  color: #1e293b;
}

.container {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg, #1e3a5f 0%, #0f172a 100%);
  color: white;
  padding: 0;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
}

.sidebar-header {
  padding: 24px 24px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.sidebar-nav {
  padding: 20px 12px;
}

.nav-section {
  margin-bottom: 24px;
}

.nav-section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.4);
  padding: 0 12px;
  margin-bottom: 8px;
}

.sidebar a {
  display: flex;
  align-items: center;
  gap: 12px;
  color: rgba(255,255,255,0.8);
  text-decoration: none;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.sidebar a:hover {
  background: rgba(255,255,255,0.1);
  color: white;
}

.sidebar a.active {
  background: rgba(34, 197, 94, 0.2);
  color: #22c55e;
}

/* Main */
.main {
  flex: 1;
  margin-left: 260px;
}

.topbar {
  background: white;
  padding: 16px 32px;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.page-title {
  font-size: 20px;
  font-weight: 600;
}

.btn-back {
  background: #f1f5f9;
  color: #475569;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}

.btn-back:hover {
  background: #e2e8f0;
}

/* Content */
.content {
  padding: 32px;
}

.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
}

.btn-primary {
  background: #22c55e;
  color: white;
}

.btn-primary:hover {
  background: #16a34a;
}

.btn-secondary {
  background: #3b82f6;
  color: white;
}

.btn-secondary:hover {
  background: #2563eb;
}

.btn-outline {
  background: white;
  color: #475569;
  border: 1px solid #e2e8f0;
}

.btn-outline:hover {
  background: #f8fafc;
  border-color: #cbd5e1;
}

/* Table */
.table-container {
  background: white;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #f8fafc;
  padding: 14px 16px;
  text-align: left;
  font-size: 13px;
  font-weight: 600;
  color: #475569;
  border-bottom: 1px solid #e2e8f0;
}

td {
  padding: 12px 16px;
  border-bottom: 1px solid #f1f5f9;
}

input, select {
  padding: 10px 12px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  width: 100%;
}

input:focus, select:focus {
  outline: none;
  border-color: #22c55e;
  box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
}

input[type="number"] {
  text-align: right;
}

/* Summary */
.summary-row {
  background: #f8fafc;
  font-weight: 600;
}

.summary-row td {
  border-top: 2px solid #e2e8f0;
}

/* Footer */
.footer-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid #e2e8f0;
}

.success-message {
  background: #dcfce7;
  color: #16a34a;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  display: none;
}

.success-message.show {
  display: block;
}

@media (max-width: 768px) {
  .sidebar {
    display: none;
  }
  .main {
    margin-left: 0;
  }
}
</style>
</head>

<body>
<div class="container">
<nav class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-icon">📊</div>
      TaxGlue
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">Main</div>
      <a href="/app/dashboard.html">🏠 Dashboard</a>
      <a href="/app/clients.html">👥 Clients</a>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Accounting</div>
      <a href="/modules/trial-balance.html" class="active">📊 Trial Balance</a>
      <a href="/modules/balance-sheet.html">⚖️ Balance Sheet</a>
    </div>
  </div>
</nav>

<main class="main">
  <header class="topbar">
    <h1 class="page-title">Trial Balance</h1>
    <a href="/app/dashboard.html" class="btn-back">← Back to Dashboard</a>
  </header>
  
  <div class="content">
    <div class="success-message" id="successMessage">Trial Balance saved successfully!</div>
    
    <div class="toolbar" style="display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
      <div>
        <label style="font-size:13px;font-weight:500;">Select Client</label>
        <select id="clientSelect" onchange="loadTrialBalance()" style="min-width:200px;">
          <option value="">-- Select Client --</option>
        </select>
      </div>
      <div>
        <label style="font-size:13px;font-weight:500;">Financial Year</label>
        <select id="fySelect" onchange="loadTrialBalance()" style="min-width:120px;">
          <option value="2024-25">2024-25</option>
          <option value="2023-24">2023-24</option>
          <option value="2022-23">2022-23</option>
          <option value="2021-22">2021-22</option>
        </select>
      </div>
    </div>
    
    <div class="toolbar">
      <button class="btn btn-primary" id="addRow">➕ Add Row</button>
      <button class="btn btn-secondary" id="saveTB">💾 Save Trial</button>
      <button class="btn btn-outline" onclick="window.print()">🖨️ Print</button>
      <button class="btn btn-outline" onclick="location.href='/modules/balance-sheet.html'">📊 Balance Sheet</button>
    </div>
    
    <div class="table-container">
      <table id="tbTable">
        <thead>
          <tr>
            <th style="width: 25%">Account Name</th>
            <th style="width: 18%">Main Head</th>
            <th style="width: 18%">Sub Head 1</th>
            <th style="width: 18%">Sub Head 2</th>
            <th style="width: 10%">Debit (₹)</th>
            <th style="width: 10%">Credit (₹)</th>
            <th style="width: 1%"></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows will be added here -->
        </tbody>
        <tfoot>
          <tr class="summary-row">
            <td colspan="4"><strong>Total</strong></td>
            <td><strong id="totalDebit">0.00</strong></td>
            <td><strong id="totalCredit">0.00</strong></td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
    
    <div class="footer-actions">
      <button class="btn btn-primary" id="addRowBottom">➕ Add Row</button>
      <button class="btn btn-secondary" id="saveTBBottom">💾 Save Trial Balance</button>
      <button class="btn btn-outline" onclick="location.href='/modules/balance-sheet.html'">📊 View Balance Sheet →</button>
    </div>
  </div>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// Supabase config
const supabaseUrl = "https://jgjeuybgideeqcjxvlmn.supabase.co"
const supabaseKey = "sb_publishable_8nwimD4up__9jnxr6RoDpg_8_Gy5w7j"
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

// Account Classification Data
const accountClassifications = {
  "Liabilities": {
    "Capital": ["Owner Capital", "Partner's Capital", "Reserve & Surplus"],
    "Non-Current Liabilities": ["Long-term borrowings", "Deferred Tax Liabilities", "Long-term Provisions"],
    "Current Liabilities": ["Trade Payables", "Short-term Provisions", "Other Current Liabilities"]
  },
  "Assets": {
    "Non-Current Assets": ["Non-Current Investments", "Fixed Assets", "Intangible Assets", "Long-term Loans"],
    "Current Assets": ["Sundry Debtors", "Cash and Bank Balances", "Short-term Investments", "Inventories"]
  },
  "Income": {
    "Sale": ["Sale of Goods", "Sale of Services", "Other Sales"],
    "Other Income": ["Interest Received", "Dividend Received", "Rent Received"]
  },
  "Expense": {
    "Purchase": ["Purchase of Goods", "Purchase of Services", "Direct Expenses"],
    "Employee Cost": ["Salaries & Wages", "Staff Benefits", "PF & ESI"],
    "Other Expenses": ["Rent", "Electricity", "Telephone", "Audit Fees", "Depreciation"]
  }
}

// Add row function
function addRow() {
  const tbody = document.getElementById('tableBody')
  const row = document.createElement('tr')
  
  let mainHeadOptions = '<option value="">Select Main Head</option>'
  Object.keys(accountClassifications).forEach(head => {
    mainHeadOptions += `<option value="${head}">${head}</option>`
  })
  
  row.innerHTML = `
    <td><input type="text" placeholder="Enter account name"></td>
    <td><select class="mainHead" onchange="updateSubHeads(this)">${mainHeadOptions}</select></td>
    <td><select class="sub1" onchange="updateSub2(this)" disabled><option value="">Select Main Head First</option></select></td>
    <td><select class="sub2" disabled><option value="">Select Sub Head 1 First</option></select></td>
    <td><input type="number" class="debit" placeholder="0.00" oninput="calculateTotals()"></td>
    <td><input type="number" class="credit" placeholder="0.00" oninput="calculateTotals()"></td>
    <td><button onclick="deleteRow(this)" style="background:#fee2e2;border:none;padding:8px;border-radius:4px;cursor:pointer;">✕</button></td>
  `
  
  tbody.appendChild(row)
}

// Update sub-head dropdowns
function updateSubHeads(select) {
  const row = select.closest('tr')
  const mainHead = select.value
  const sub1Select = row.querySelector('.sub1')
  const sub2Select = row.querySelector('.sub2')
  
  if (mainHead && accountClassifications[mainHead]) {
    let sub1Options = '<option value="">Select Sub Head 1</option>'
    Object.keys(accountClassifications[mainHead]).forEach(sub1 => {
      sub1Options += `<option value="${sub1}">${sub1}</option>`
    })
    sub1Select.innerHTML = sub1Options
    sub1Select.disabled = false
  } else {
    sub1Select.innerHTML = '<option value="">Select Main Head First</option>'
    sub1Select.disabled = true
    sub2Select.innerHTML = '<option value="">Select Sub Head 1 First</option>'
    sub2Select.disabled = true
  }
  
  sub2Select.value = ''
}

function updateSub2(select) {
  const row = select.closest('tr')
  const mainHead = row.querySelector('.mainHead').value
  const sub1 = select.value
  const sub2Select = row.querySelector('.sub2')
  
  if (mainHead && sub1 && accountClassifications[mainHead][sub1]) {
    let sub2Options = '<option value="">Select Sub Head 2</option>'
    accountClassifications[mainHead][sub1].forEach(sub2 => {
      sub2Options += `<option value="${sub2}">${sub2}</option>`
    })
    sub2Select.innerHTML = sub2Options
    sub2Select.disabled = false
  } else {
    sub2Select.innerHTML = '<option value="">Select Sub Head 1 First</option>'
    sub2Select.disabled = true
  }
}

// Calculate totals
function calculateTotals() {
  let totalDebit = 0
  let totalCredit = 0
  
  document.querySelectorAll('.debit').forEach(input => {
    totalDebit += parseFloat(input.value) || 0
  })
  
  document.querySelectorAll('.credit').forEach(input => {
    totalCredit += parseFloat(input.value) || 0
  })
  
  document.getElementById('totalDebit').textContent = totalDebit.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})
  document.getElementById('totalCredit').textContent = totalCredit.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})
}

// Delete row
function deleteRow(btn) {
  const row = btn.closest('tr')
  row.remove()
  calculateTotals()
}

// Save trial balance to Supabase
async function saveTrialBalance() {
  const clientId = document.getElementById('clientSelect').value
  const fy = document.getElementById('fySelect').value
  
  if (!clientId) {
    alert('Please select a client first')
    return
  }
  
  const rows = document.querySelectorAll('#tableBody tr')
  const data = []
  
  rows.forEach(row => {
    const accountName = row.querySelector('input[type="text"]').value
    const mainHead = row.querySelector('.mainHead').value
    const sub1 = row.querySelector('.sub1').value
    const sub2 = row.querySelector('.sub2').value
    const debit = parseFloat(row.querySelector('.debit').value) || 0
    const credit = parseFloat(row.querySelector('.credit').value) || 0
    
    if (accountName || debit || credit) {
      data.push({ accountName, mainHead, sub1, sub2, debit, credit })
    }
  })
  
  console.log('Saving Trial Balance:', { clientId, fy, data })
  
  try {
    await supabase.from('trial_balance').upsert({
      client_id: clientId,
      fy: fy,
      data: data,
      updated_at: new Date().toISOString()
    }, { onConflict: 'client_id, fy' })
    
    // Show success message
    const successMsg = document.getElementById('successMessage')
    successMsg.textContent = 'Trial Balance saved successfully!'
    successMsg.classList.add('show')
    setTimeout(() => {
      successMsg.classList.remove('show')
    }, 3000)
  } catch (e) {
    console.error('Error saving:', e)
    alert('Error saving: ' + e.message)
  }
}

// Load trial balance from Supabase
async function loadTrialBalance() {
  const clientId = document.getElementById('clientSelect').value
  const fy = document.getElementById('fySelect').value
  
  if (!clientId) {
    // Clear table
    document.getElementById('tableBody').innerHTML = ''
    addRow()
    addRow()
    addRow()
    return
  }
  
  try {
    const { data, error } = await supabase
      .from('trial_balance')
      .select('data')
      .eq('client_id', clientId)
      .eq('fy', fy)
      .single()
    
    if (error) {
      console.log('No existing data found')
    }
    
    if (data && data.data) {
      // Populate table with saved data
      const tbody = document.getElementById('tableBody')
      tbody.innerHTML = ''
      
      data.data.forEach(row => {
        const tr = document.createElement('tr')
        
        let mainHeadOptions = '<option value="">Select Main Head</option>'
        Object.keys(accountClassifications).forEach(head => {
          mainHeadOptions += `<option value="${head}" ${row.mainHead === head ? 'selected' : ''}>${head}</option>`
        })
        
        let sub1Options = '<option value="">Select Sub Head 1</option>'
        let sub2Options = '<option value="">Select Sub Head 2</option>'
        
        if (row.mainHead && accountClassifications[row.mainHead]) {
          Object.keys(accountClassifications[row.mainHead]).forEach(sub1 => {
            sub1Options += `<option value="${sub1}" ${row.sub1 === sub1 ? 'selected' : ''}>${sub1}</option>`
          })
        }
        
        if (row.mainHead && row.sub1 && accountClassifications[row.mainHead][row.sub1]) {
          accountClassifications[row.mainHead][row.sub1].forEach(sub2 => {
            sub2Options += `<option value="${sub2}" ${row.sub2 === sub2 ? 'selected' : ''}>${sub2}</option>`
          })
        }
        
        tr.innerHTML = `
          <td><input type="text" placeholder="Enter account name" value="${row.accountName || ''}"></td>
          <td><select class="mainHead" onchange="updateSubHeads(this)">${mainHeadOptions}</select></td>
          <td><select class="sub1" onchange="updateSub2(this)">${sub1Options}</select></td>
          <td><select class="sub2">${sub2Options}</select></td>
          <td><input type="number" class="debit" placeholder="0.00" value="${row.debit || ''}" oninput="calculateTotals()"></td>
          <td><input type="number" class="credit" placeholder="0.00" value="${row.credit || ''}" oninput="calculateTotals()"></td>
          <td><button onclick="deleteRow(this)" style="background:#fee2e2;border:none;padding:8px;border-radius:4px;cursor:pointer;">✕</button></td>
        `
        
        tbody.appendChild(tr)
      })
      
      calculateTotals()
    } else {
      // No data, add empty rows
      document.getElementById('tableBody').innerHTML = ''
      addRow()
      addRow()
      addRow()
    }
  } catch (e) {
    console.error('Error loading:', e)
  }
}

// Load clients when DOM is ready
document.addEventListener('DOMContentLoaded', function() {
  // Demo clients - always available
  const demoClients = [
    { id: 'demo-1', name: 'Singla Steel Corporation' },
    { id: 'demo-2', name: 'Rana Industries' },
    { id: 'demo-3', name: 'Sharma Traders' },
    { id: 'demo-4', name: 'Gupta Construction' },
    { id: 'demo-5', name: 'Aggarwal Textiles' },
    { id: 'demo-6', name: 'Jain Logistics' },
    { id: 'demo-7', name: 'Patel Electronics' },
    { id: 'demo-8', name: 'Reddy & Co' },
    { id: 'demo-9', name: 'Kumar Medical Stores' },
    { id: 'demo-10', name: 'Chowdhury Consultants' }
  ]
  
  // Populate dropdown
  const select = document.getElementById('clientSelect')
  if (select) {
    demoClients.forEach(c => {
      const opt = document.createElement('option')
      opt.value = c.id
      opt.textContent = c.name
      select.appendChild(opt)
    })
  }
  
  // Try to load from Supabase in background
  if (typeof supabase !== 'undefined') {
    setTimeout(async () => {
      try {
        const { data } = await supabase.from('clients').select('id, name')
        if (data && data.length > 0) {
          const sel = document.getElementById('clientSelect')
          if (sel) {
            sel.innerHTML = '<option value="">-- Select Client --</option>'
            data.forEach(c => {
              const opt = document.createElement('option')
              opt.value = c.id
              opt.textContent = c.name
              sel.appendChild(opt)
            })
          }
        }
      } catch (e) {
        console.log('Supabase not available')
      }
    }, 500)
  }
})

// Event listeners
document.getElementById('addRow').addEventListener('click', addRow)
document.getElementById('addRowBottom').addEventListener('click', addRow)
document.getElementById('saveTB').addEventListener('click', saveTrialBalance)
document.getElementById('saveTBBottom').addEventListener('click', saveTrialBalance)

// Add initial rows
addRow()
addRow()
addRow()
</script>
</body>
</html>
