<script>
// Supabase config
const supabaseUrl = "https://jgjeuybgideeqcjxvlmn.supabase.co"
const supabaseKey = "sb_publishable_8nwimD4up__9jnxr6RoDpg_8_Gy5w7j"
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

// Account Classification Data
const accountClassifications = {
  "Liabilities": {
    "Capital": ["Owner Capital", "Partner's Capital", "Reserve & Surplus"],
    "Non-Current Liabilities": ["Long-term borrowings", "Deferred Tax Liabilities", "Long-term Provisions"],

  "Assets": {
    "Non-Current Assets": ["Non-Current Investments", "Fixed Assets", "Intangible Assets", "Long-term Loans"],
    "Current Assets": ["Sundry Debtors", "Cash and Bank Balances", "Short-term Investments", "Inventories"]
  },
  "Income": {
    "Sale": ["Sale of Goods", "Sale of Services", "Other Sales"],
    "Other Income": ["Interest Received", "Dividend Received", "Rent Received"]
  },
  "Expense": {
    "Purchase": ["Purchase of Goods", "Purchase of Services", "Direct Expenses"],
    "Employee Cost": ["Salaries & Wages", "Staff Benefits", "PF & ESI"],
    "Other Expenses": ["Rent", "Electricity", "Telephone", "Audit Fees", "Depreciation"]

}

// Add row function
function addRow() {
  try {
    console.log('addRow called')
    const tbody = document.getElementById('tableBody')
    if (!tbody) {
      console.error('tableBody not found!')
      alert('tableBody not found')
      return
    }
    const row = document.createElement('tr')
    
    let mainHeadOptions = '<option value="">Select Main Head</option>'
    Object.keys(accountClassifications).forEach(head => {
      mainHeadOptions += `<option value="${head}">${head}</option>`
    })
    
    row.innerHTML = `
      <td><input type="text" placeholder="Enter account name"></td>
      <td><select class="mainHead" onchange="updateSubHeads(this)">${mainHeadOptions}</select></td>
      <td><select class="sub1" onchange="updateSub2(this)" disabled><option value="">Select Main Head First</option></select></td>
      <td><select class="sub2" disabled><option value="">Select Sub Head 1 First</option></select></td>
      <td><input type="number" class="debit" placeholder="0.00" oninput="calculateTotals()"></td>
      <td><input type="number" class="credit" placeholder="0.00" oninput="calculateTotals()"></td>
      <td><button onclick="deleteRow(this)" style="background:#fee2e2;border:none;padding:8px;border-radius:4px;cursor:pointer;">✕</button></td>
    `
    
    tbody.appendChild(row)
    console.log('Row added successfully')
  } catch(e) {
    console.error('Error in addRow:', e)
    alert('Error: ' + e.message)
  }
}

// Update sub-head dropdowns
function updateSubHeads(select) {
  const row = select.closest('tr')
  const mainHead = select.value
  const sub1Select = row.querySelector('.sub1')
  const sub2Select = row.querySelector('.sub2')
  
  if (mainHead && accountClassifications[mainHead]) {
    let sub1Options = '<option value="">Select Sub Head 1</option>'
    Object.keys(accountClassifications[mainHead]).forEach(sub1 => {
      sub1Options += `<option value="${sub1}">${sub1}</option>`
    })
    sub1Select.innerHTML = sub1Options
    sub1Select.disabled = false
  } else {
    sub1Select.innerHTML = '<option value="">Select Main Head First</option>'
    sub1Select.disabled = true
    sub2Select.innerHTML = '<option value="">Select Sub Head 1 First</option>'
    sub2Select.disabled = true
  }
  
  sub2Select.value = ''
}

function updateSub2(select) {
  const row = select.closest('tr')
  const mainHead = row.querySelector('.mainHead').value
  const sub1 = select.value
  const sub2Select = row.querySelector('.sub2')
  
  if (mainHead && sub1 && accountClassifications[mainHead][sub1]) {
    let sub2Options = '<option value="">Select Sub Head 2</option>'
    accountClassifications[mainHead][sub1].forEach(sub2 => {
      sub2Options += `<option value="${sub2}">${sub2}</option>`
    })
    sub2Select.innerHTML = sub2Options
    sub2Select.disabled = false
  } else {
    sub2Select.innerHTML = '<option value="">Select Sub Head 1 First</option>'
    sub2Select.disabled = true
  }
}

// Calculate totals
function calculateTotals() {
  let totalDebit = 0
  let totalCredit = 0
  
  document.querySelectorAll('.debit').forEach(input => {
    totalDebit += parseFloat(input.value) || 0
  })
  
  document.querySelectorAll('.credit').forEach(input => {
    totalCredit += parseFloat(input.value) || 0
  })
  
  document.getElementById('totalDebit').textContent = totalDebit.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})
  document.getElementById('totalCredit').textContent = totalCredit.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})
  
  // Check if totals match
  const diff = Math.abs(totalDebit - totalCredit)
  const matchEl = document.getElementById('totalsMatch')
  if (matchEl) {
    if (diff < 1) {
      matchEl.innerHTML = '<span style="color: #22c55e;">✓ Totals Match</span>'
    } else {
      matchEl.innerHTML = '<span style="color: #dc2626;">✗ Difference: ₹' + diff.toLocaleString('en-IN') + '</span>'
    }
  }
}

// Auto-calculate from voucher data
async function autoCalculateFromLedger() {
  const clientId = document.getElementById('clientSelect').value
  const fy = document.getElementById('fySelect').value
  
  if (!clientId) {
    alert('Please select a client first')
    return
  }
  
  // Load vouchers for this client
  try {
    let voucherData = []
    
    // Try to get from Supabase vouchers table
    const { data: vouchers, error } = await supabase
      .from('vouchers')
      .select('lines')
      .eq('client_id', clientId)
      .eq('fy', fy)
    
    if (vouchers && vouchers.length > 0) {
      // Aggregate by account
      const accountBalances = {}
      
      vouchers.forEach(v => {
        if (v.lines && Array.isArray(v.lines)) {
          v.lines.forEach(line => {
            const accId = line.account_id
            if (!accountBalances[accId]) {
              accountBalances[accId] = { debit: 0, credit: 0 }
            }
            accountBalances[accId].debit += parseFloat(line.debit) || 0
            accountBalances[accId].credit += parseFloat(line.credit) || 0
          })
        }
      })
      
      // Build trial balance rows
      const tbody = document.getElementById('tableBody')
      tbody.innerHTML = ''
      
      for (const [accId, bal] of Object.entries(accountBalances)) {
        const netBalance = bal.debit - bal.credit
        const tr = document.createElement('tr')
        
        let mainHeadOptions = '<option value="">Select</option>'
        Object.keys(accountClassifications).forEach(head => {
          mainHeadOptions += `<option value="${head}">${head}</option>`
        })
        
        if (netBalance >= 0) {
          tr.innerHTML = `
            <td><input type="text" placeholder="Account name" value="${accId}"></td>
            <td><select class="mainHead" onchange="updateSubHeads(this)">${mainHeadOptions}</select></td>
            <td><select class="sub1" onchange="updateSub2(this)"><option value="">Select</option></select></td>
            <td><select class="sub2"><option value="">Select</option></select></td>
            <td><input type="number" class="debit" value="${netBalance.toFixed(2)}" oninput="calculateTotals()"></td>
            <td><input type="number" class="credit" value="0.00" oninput="calculateTotals()"></td>
            <td><button onclick="deleteRow(this)" style="background:#fee2e2;border:none;padding:8px;border-radius:4px;cursor:pointer;">✕</button></td>
          `
        } else {
          tr.innerHTML = `
            <td><input type="text" placeholder="Account name" value="${accId}"></td>
            <td><select class="mainHead" onchange="updateSubHeads(this)">${mainHeadOptions}</select></td>
            <td><select class="sub1" onchange="updateSub2(this)"><option value="">Select</option></select></td>
            <td><select class="sub2"><option value="">Select</option></select></td>
            <td><input type="number" class="debit" value="0.00" oninput="calculateTotals()"></td>
            <td><input type="number" class="credit" value="${Math.abs(netBalance).toFixed(2)}" oninput="calculateTotals()"></td>
            <td><button onclick="deleteRow(this)" style="background:#fee2e2;border:none;padding:8px;border-radius:4px;cursor:pointer;">✕</button></td>
          `
        }
        
        tbody.appendChild(tr)
      }
      
      calculateTotals()
      
      // Also save to financial statements
      localStorage.setItem(`trialBalance_${clientId}_${fy}`, JSON.stringify(vouchers))
      
      alert('✓ Trial Balance calculated from voucher data!\nTotal accounts: ' + Object.keys(accountBalances).length)
      
    } else {
      // Check for legacy demo data
      const localData = localStorage.getItem('vouchers_' + clientId)
      if (localData) {
        alert('Found local voucher data. Using demo calculation.')
        const demoAccounts = ['Cash', 'Bank', 'Sundry Debtors', 'Sundry Creditors', 'Sales', 'Purchase', 'Salaries', 'Rent']
        const tbody = document.getElementById('tableBody')
        tbody.innerHTML = ''
        
        demoAccounts.forEach((name, i) => {
          const tr = document.createElement('tr')
          const amount = (i + 1) * 10000
          const isDebit = ['Cash', 'Bank', 'Sundry Debtors', 'Purchase', 'Salaries', 'Rent'].includes(name)
          
          tr.innerHTML = `
            <td><input type="text" placeholder="Account name" value="${name}"></td>
            <td><select class="mainHead" onchange="updateSubHeads(this)"><option value="">Select</option><option value="Assets">Assets</option><option value="Liabilities">Liabilities</option><option value="Income">Income</option><option value="Expense">Expense</option></select></td>
            <td><select class="sub1"><option value="">Select</option></select></td>
            <td><select class="sub2"><option value="">Select</option></select></td>
            <td><input type="number" class="debit" value="${isDebit ? amount : '0.00'}" oninput="calculateTotals()"></td>
            <td><input type="number" class="credit" value="${!isDebit ? amount : '0.00'}" oninput="calculateTotals()"></td>
            <td><button onclick="deleteRow(this)" style="background:#fee2e2;border:none;padding:8px;border-radius:4px;cursor:pointer;">✕</button></td>
          `
          tbody.appendChild(tr)
        })
        
        calculateTotals()
        alert('✓ Trial Balance calculated from demo data!')
      } else {
        alert('No voucher data found. Please create vouchers first, then click Auto-Calculate.')
      }
    }
  } catch (e) {
    console.error('Error auto-calculating:', e)
    alert('Error calculating from ledger: ' + e.message)
  }
}

// Import from Excel
function importFromExcel(event) {
  const file = event.target.files[0]
  if (!file) return
  
  const reader = new FileReader()
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result)
      const workbook = XLSX.read(data, { type: 'array' })
      
      // Get first sheet
      const sheetName = workbook.SheetNames[0]
      const sheet = workbook.Sheets[sheetName]
      
      // Convert to JSON
      const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 })
      
      if (jsonData.length < 2) {
        alert('Excel file appears to be empty or has no data rows')
        return
      }
      
      // Clear existing rows
      const tbody = document.getElementById('tableBody')
      tbody.innerHTML = ''
      
      let rowCount = 0
      let skippedRows = 0
      let rowsData = [] // Store row data for financial statements
      
      // Expected columns: Account Name, Main Head, Sub Head 1, Sub Head 2, Debit, Credit
      // Try to find column positions from header row
      const headers = jsonData[0] || []
      
      // Find column indices (case-insensitive)
      let accIdx = -1, debitIdx = -1, creditIdx = -1, mainHeadIdx = -1
      
      headers.forEach((h, i) => {
        const headerLower = (h || '').toString().toLowerCase()
        if (headerLower.includes('account') || headerLower.includes('name')) accIdx = i
        if (headerLower.includes('debit')) debitIdx = i
        if (headerLower.includes('credit')) creditIdx = i
        if (headerLower.includes('main') || headerLower.includes('head')) mainHeadIdx = i
      })
      
      // Default to first columns if not found
      if (accIdx === -1) accIdx = 0
      if (debitIdx === -1 && headers.length > 3) debitIdx = 4
      if (creditIdx === -1 && headers.length > 4) creditIdx = 5
      
      // Process data rows (skip header row)
      for (let i = 1; i < jsonData.length; i++) {
        const row = jsonData[i]
        if (!row || row.length === 0) continue
        
        const accountName = row[accIdx] ? row[accIdx].toString().trim() : ''
        const debit = parseFloat(row[debitIdx]) || 0
        const credit = parseFloat(row[creditIdx]) || 0
        
        // Skip empty rows or header-like rows
        if (!accountName || accountName === '' || 
            accountName.toLowerCase().includes('account') ||
            accountName.toLowerCase().includes('total') ||
            accountName.toLowerCase().includes(' Particulars')) {
          skippedRows++
          continue
        }
        
        // Create row
        const tr = document.createElement('tr')
        
        let mainHeadOptions = '<option value="">Select</option>'
        Object.keys(accountClassifications).forEach(head => {
          mainHeadOptions += `<option value="${head}">${head}</option>`
        })
        
        // Auto-detect main head based on account name
        let autoMainHead = ''
        const nameLower = accountName.toLowerCase()
        if (nameLower.includes('cash') || nameLower.includes('bank') || nameLower.includes('debtor') || nameLower.includes('asset') || nameLower.includes('fixed')) {
          autoMainHead = 'Assets'
        } else if (nameLower.includes('creditor') || nameLower.includes('liability') || nameLower.includes('loan') || nameLower.includes('capital')) {
          autoMainHead = 'Liabilities'
        } else if (nameLower.includes('sales') || nameLower.includes('income') || nameLower.includes('revenue')) {
          autoMainHead = 'Income'
        } else if (nameLower.includes('purchase') || nameLower.includes('expense') || nameLower.includes('salary') || nameLower.includes('rent')) {
          autoMainHead = 'Expense'
        }
        
        tr.innerHTML = `
          <td><input type="text" placeholder="Account name" value="${accountName}"></td>
          <td><select class="mainHead" onchange="updateSubHeads(this)">${mainHeadOptions}</select></td>
          <td><select class="sub1" onchange="updateSub2(this)"><option value="">Select</option></select></td>
          <td><select class="sub2"><option value="">Select</option></select></td>
          <td><input type="number" class="debit" value="${debit > 0 ? debit.toFixed(2) : ''}" oninput="calculateTotals()"></td>
          <td><input type="number" class="credit" value="${credit > 0 ? credit.toFixed(2) : ''}" oninput="calculateTotals()"></td>
          <td><button onclick="deleteRow(this)" style="background:#fee2e2;border:none;padding:8px;border-radius:4px;cursor:pointer;">✕</button></td>
        `
        
        tbody.appendChild(tr)
        rowCount++
        
        // Store row data for financial statements
        rowsData.push({
          accountName: accountName,
          mainHead: autoMainHead,
          sub1: '',
          sub2: '',
          debit: debit > 0 ? debit : 0,
          credit: credit > 0 ? credit : 0
        })
        
        // Auto-select main head if detected
        setTimeout(() => {
          const mainHeadSelect = tr.querySelector('.mainHead')
          if (mainHeadSelect && autoMainHead) {
            mainHeadSelect.value = autoMainHead
            updateSubHeads(mainHeadSelect)
          }
        }, 50)
      }
      
      calculateTotals()
      
      // Save to localStorage for Financial Statements
      const clientId = document.getElementById('clientSelect').value
      const fy = document.getElementById('fySelect').value
      if (clientId && fy) {
        // Convert to format expected by financial statements
        const tbData = rowsData.map(r => ({
          accountName: r.accountName,
          mainHead: r.mainHead,
          sub1: r.sub1,
          sub2: r.sub2,
          debit: r.debit,
          credit: r.credit
        }))
        localStorage.setItem(`trialBalance_${clientId}_${fy}`, JSON.stringify(tbData))
        // Set flag to show import success message on financial statements
        localStorage.setItem('justImported_' + clientId + '_' + fy, 'true')
      }
      
      // Show result with option to proceed
      if (rowCount > 0) {
        const proceed = confirm(`✓ Successfully imported ${rowCount} rows from Excel!\n(Skipped ${skippedRows} empty/header rows)\n\nClick OK to go to Financial Statements, or Cancel to stay here.`)
        if (proceed) {
          window.location.href = `/modules/financial-statements.html?client=${clientId}&fy=${fy}`
        }
      } else {
        alert('No valid data rows found in the Excel file.\n\nExpected format:\n- Account Name | Debit | Credit\n- Or any format with these columns')
      }
      
      // Reset file input
      event.target.value = ''
      
    } catch (error) {
      console.error('Error importing Excel:', error)
      alert('Error reading Excel file: ' + error.message)
      event.target.value = ''
    }
  }
  reader.readAsArrayBuffer(file)
}

  const filename = 'TaxGlue_Trial_Balance_Template.xlsx'

    XLSX.writeFile(wb, filename)
    return
  } catch (e) {

  // Fallback: Convert to base64 and download

// Delete row
function deleteRow(btn) {
  const row = btn.closest('tr')
  row.remove()
  calculateTotals()
}

// Save trial balance to Supabase
async function saveTrialBalance() {
  const clientId = document.getElementById('clientSelect').value
  const fy = document.getElementById('fySelect').value
  
  if (!clientId) {
    alert('Please select a client first')
    return
  }
  
  const rows = document.querySelectorAll('#tableBody tr')
  const data = []
  
  rows.forEach(row => {
    const accountName = row.querySelector('input[type="text"]').value
    const mainHead = row.querySelector('.mainHead').value
    const sub1 = row.querySelector('.sub1').value
    const sub2 = row.querySelector('.sub2').value
    const debit = parseFloat(row.querySelector('.debit').value) || 0
    const credit = parseFloat(row.querySelector('.credit').value) || 0
    
    if (accountName || debit || credit) {
      data.push({ accountName, mainHead, sub1, sub2, debit, credit })
    }
  })
  
  console.log('Saving Trial Balance:', { clientId, fy, data })
  
  try {
    await supabase.from('trial_balance').upsert({
      client_id: clientId,
      fy: fy,
      data: data,
      updated_at: new Date().toISOString()
    }, { onConflict: 'client_id, fy' })
    
    // Show success message
    const successMsg = document.getElementById('successMessage')
    successMsg.textContent = 'Trial Balance saved successfully!'
    successMsg.classList.add('show')
    setTimeout(() => {
      successMsg.classList.remove('show')
    }, 3000)
  } catch (e) {
    console.error('Error saving:', e)
    alert('Error saving: ' + e.message)
  }
}

// Load trial balance from Supabase
async function loadTrialBalance() {
  const clientId = document.getElementById('clientSelect').value
  const fy = document.getElementById('fySelect').value
  
  if (!clientId) {
    // Clear table
    document.getElementById('tableBody').innerHTML = ''
    addRow()
    addRow()
    addRow()
    return
  }
  
  try {
    const { data, error } = await supabase
      .from('trial_balance')
      .select('data')
      .eq('client_id', clientId)
      .eq('fy', fy)
      .single()
    
    if (error) {
      console.log('No existing data found')
    }
    
    if (data && data.data) {
      // Populate table with saved data
      const tbody = document.getElementById('tableBody')
      tbody.innerHTML = ''
      
      data.data.forEach(row => {
        const tr = document.createElement('tr')
        
        let mainHeadOptions = '<option value="">Select Main Head</option>'
        Object.keys(accountClassifications).forEach(head => {
          mainHeadOptions += `<option value="${head}" ${row.mainHead === head ? 'selected' : ''}>${head}</option>`
        })
        
        let sub1Options = '<option value="">Select Sub Head 1</option>'
        let sub2Options = '<option value="">Select Sub Head 2</option>'
        
        if (row.mainHead && accountClassifications[row.mainHead]) {
          Object.keys(accountClassifications[row.mainHead]).forEach(sub1 => {
            sub1Options += `<option value="${sub1}" ${row.sub1 === sub1 ? 'selected' : ''}>${sub1}</option>`
          })
        }
        
        if (row.mainHead && row.sub1 && accountClassifications[row.mainHead][row.sub1]) {
          accountClassifications[row.mainHead][row.sub1].forEach(sub2 => {
            sub2Options += `<option value="${sub2}" ${row.sub2 === sub2 ? 'selected' : ''}>${sub2}</option>`
          })
        }
        
        tr.innerHTML = `
          <td><input type="text" placeholder="Enter account name" value="${row.accountName || ''}"></td>
          <td><select class="mainHead" onchange="updateSubHeads(this)">${mainHeadOptions}</select></td>
          <td><select class="sub1" onchange="updateSub2(this)">${sub1Options}</select></td>
          <td><select class="sub2">${sub2Options}</select></td>
          <td><input type="number" class="debit" placeholder="0.00" value="${row.debit || ''}" oninput="calculateTotals()"></td>
          <td><input type="number" class="credit" placeholder="0.00" value="${row.credit || ''}" oninput="calculateTotals()"></td>
          <td><button onclick="deleteRow(this)" style="background:#fee2e2;border:none;padding:8px;border-radius:4px;cursor:pointer;">✕</button></td>
        `
        
        tbody.appendChild(tr)
      })
      
      calculateTotals()
    } else {
      // No data, add empty rows
      document.getElementById('tableBody').innerHTML = ''
      addRow()
      addRow()
      addRow()
    }
  } catch (e) {
    console.error('Error loading:', e)
  }
}
