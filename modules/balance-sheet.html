<!DOCTYPE html>
<html>

<head>
<title>Balance Sheet | TaxGlue</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  .bs-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    font-family: Arial, sans-serif;
  }
  .bs-header {
    text-align: center;
    margin-bottom: 30px;
  }
  .bs-header h2 {
    font-size: 24px;
    margin-bottom: 5px;
  }
  .bs-currency {
    color: #666;
    font-size: 14px;
  }
  .bs-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .bs-table th, .bs-table td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: left;
  }
  .bs-table th {
    background-color: #f5f5f5;
    font-weight: bold;
  }
  .col-sr { width: 50px; }
  .col-particulars { width: 350px; }
  .col-note { width: 60px; text-align: center; }
  .col-amount { width: 150px; text-align: right; }
  .amount { text-align: right; }
  .section-header td {
    background-color: #e8f4fc;
    font-size: 16px;
  }
  .sub-section-header td {
    background-color: #f0f0f0;
  }
  .group-header td {
    background-color: #fafafa;
    font-style: italic;
  }
  .total-row td {
    background-color: #f5f5f5;
    border-top: 2px solid #333;
  }
  .account-name {
    padding-left: 20px !important;
  }
  .bs-balance-check {
    margin-top: 20px;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    background-color: #e8f5e9;
    border-radius: 5px;
  }
  .back-btn {
    background: #2563eb;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 20px;
  }
  .back-btn:hover {
    background: #1d4ed8;
  }
</style>
</head>

<body>

<div class="bs-container">
  <h1>Balance Sheet</h1>
  <div id="balanceSheetContainer"></div>
  <button class="back-btn" onclick="location.href='/app/dashboard.html'">Back to Dashboard</button>
</div>

<script type="module" src="/modules/balanceSheet.js"></script>

</body>

</html>
