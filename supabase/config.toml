# Supabase CLI Configuration
# https://supabase.com/docs/reference/cli/supabase-init

project_id = "taxglue"

[api]
enabled = true
port = 54321
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://www.taxglue.in"
additional_redirect_urls = ["https://www.taxglue.in"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Uncomment to enable social auth
# [auth.external.github]
# enabled = true
# [auth.external.google]
# enabled = true
